services:
  - type: web
    name: defnote-api
    env: node
    rootDir: api
    buildCommand: pnpm install && pnpm run build && pnpm run db:migrate
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: defnote-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production

  - type: static
    name: defnote-web
    rootDir: web
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: defnote-db
    databaseName: defnote
    user: defnote
